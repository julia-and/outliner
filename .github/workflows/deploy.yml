name: Deploy

on:
  push:
    branches: [main]

# Serialize deploys to the shared bucket. Two pushes close together (e.g. two
# PRs merged seconds apart) would otherwise run concurrent `aws s3 sync
# --delete` jobs with different hashed assets, and one job's --delete can wipe
# the other's assets — leaving index.html pointing at 404'd JS/CSS. Queue
# instead of cancel so each deploy finishes atomically and the last push wins.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Upload hashed assets (immutable, 1 year)
        run: |
          aws s3 sync dist/assets/ "s3://$SCW_BUCKET/assets/" \
            --delete \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE \
            --endpoint-url "https://s3.${SCW_REGION}.scw.cloud"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.SCW_REGION }}
          SCW_BUCKET: ${{ secrets.SCW_BUCKET }}
          SCW_REGION: ${{ secrets.SCW_REGION }}

      - name: Upload remaining files (no-cache)
        run: |
          aws s3 sync dist/ "s3://$SCW_BUCKET/" \
            --delete \
            --exclude "assets/*" \
            --acl public-read \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE \
            --endpoint-url "https://s3.${SCW_REGION}.scw.cloud"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.SCW_REGION }}
          SCW_BUCKET: ${{ secrets.SCW_BUCKET }}
          SCW_REGION: ${{ secrets.SCW_REGION }}
